name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  backend:
    name: Backend — Test, Build, Dockerize, Push, Deploy (Step format)
    runs-on: ubuntu-latest
    env:
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Step 1 — Checkout repository
        uses: actions/checkout@v4

      - name: Step 2 — Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Step 3 — Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Step 4 — Run backend tests
        run: ./gradlew test

      - name: Step 5 — Build backend artifact
        run: ./gradlew clean assemble

      - name: Step 6 — Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Step 7 — Build and push backend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/food-delivery-backend:${{ github.sha }}

      - name: Step 8 — Upload backend test results (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/build/reports/tests/test
            backend/build/test-results/test

      - name: Step 9 — Deploy backend to Kubernetes (if configured)
        if: ${{ env.KUBE_CONFIG != '' }}
        uses: azure/setup-kubectl@v3

      - name: Step 10 — Apply backend k8s manifest
        if: ${{ env.KUBE_CONFIG != '' }}
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/food-delivery-backend:${{ github.sha }}
        run: |
          echo "${{ env.KUBE_CONFIG }}" > $HOME/.kube/config
          sed -i "s|__IMAGE__|${IMAGE}|g" $GITHUB_WORKSPACE/k8s/backend-deployment.yaml
          kubectl apply -f $GITHUB_WORKSPACE/k8s/backend-deployment.yaml

  frontend:
    name: Frontend — Test, Build, Dockerize, Push, Deploy (runs after backend)
    runs-on: ubuntu-latest
    needs: backend
    env:
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Step 1 — Checkout repository
        uses: actions/checkout@v4

      - name: Step 2 — Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Step 3 — Install dependencies
        run: npm install

      - name: Step 4 — Run frontend tests
        run: CI=true npm test -- --watchAll=false || true

      - name: Step 5 — Build frontend
        run: npm run build

      - name: Step 6 — Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Step 7 — Build and push frontend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/food-delivery-frontend:${{ github.sha }}

      - name: Step 8 — Deploy frontend to Kubernetes (if configured)
        if: ${{ env.KUBE_CONFIG != '' }}
        uses: azure/setup-kubectl@v3

      - name: Step 9 — Apply frontend k8s manifest
        if: ${{ env.KUBE_CONFIG != '' }}
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/food-delivery-frontend:${{ github.sha }}
        run: |
          echo "${{ env.KUBE_CONFIG }}" > $HOME/.kube/config
          sed -i "s|__IMAGE__|${IMAGE}|g" $GITHUB_WORKSPACE/k8s/frontend-deployment.yaml
          kubectl apply -f $GITHUB_WORKSPACE/k8s/frontend-deployment.yaml
