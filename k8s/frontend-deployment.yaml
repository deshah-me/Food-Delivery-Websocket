apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-delivery-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: food-delivery-frontend
  template:
    metadata:
      labels:
        app: food-delivery-frontend
    spec:
      containers:
        - name: frontend
          image: __IMAGE__
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: food-delivery-frontend
spec:
  selector:
    app: food-delivery-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
