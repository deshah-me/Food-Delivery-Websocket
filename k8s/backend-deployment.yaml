apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-delivery-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: food-delivery-backend
  template:
    metadata:
      labels:
        app: food-delivery-backend
    spec:
      containers:
        - name: backend
          image: __IMAGE__
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: production

---
apiVersion: v1
kind: Service
metadata:
  name: food-delivery-backend
spec:
  selector:
    app: food-delivery-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
